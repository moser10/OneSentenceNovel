name = "one-sentence-novel"
main = "worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "."
binding = "ASSETS"

# Git 部署 (npx wrangler deploy) 必须在 wrangler.toml 声明 D1，仅控制台绑定可能不生效
# 获取 database_id：Cloudflare → D1 → 点数据库 → 右侧 Database ID
[[d1_databases]]
binding = "DB"
database_name = "onesentencenovel"
database_id = "1c4cce8e-c510-450d-8277-80b29d415c4b"

# 根域与 www 都指向 Worker；根域在 worker.js 内 301 到 www
[[routes]]
pattern = "www.1024201.com/*"
zone_name = "1024201.com"

[[routes]]
pattern = "1024201.com/*"
zone_name = "1024201.com"
